<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSA Catalogue</title>
  <link rel="icon" type="image/png" href="assets/brand/ssa-logo-sm.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=27" />
</head>
<body>
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo" aria-label="SSA Catalogue">
        <img src="assets/brand/ssa-logo-sm.png" alt="SSA" class="logo-img logo-img--light" />
      </a>
      <nav class="nav">
        <a href="index.html" data-i18n="home">Accueil</a>
        <a href="catalogue.html" class="active" data-i18n="catalogue">Catalogue</a>
      </nav>
      <div class="lang-switch" role="tablist" aria-label="Language">
        <button data-lang="fr" type="button">FR</button>
        <button data-lang="en" type="button">EN</button>
      </div>
    </div>
  </header>

  <main class="section catalogue-page">
    <div class="section-inner">
      <div class="catalogue-header">
        <h1 class="section-title" data-i18n="catalogue">Catalogue</h1>
        <div id="active-filters" class="active-filters"></div>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <input
            id="search-input"
            type="search"
            placeholder="Rechercher..."
            data-i18n-placeholder="search_placeholder"
            autocomplete="off"
          />
        </div>
        <select id="family-filter" class="filter-select" aria-label="Filter by family"></select>
        <select id="sort-select" class="filter-select" aria-label="Sort"></select>
        <div class="view-toggle" role="group" aria-label="View mode">
          <button type="button" class="view-toggle__btn" data-view="grid" aria-pressed="true" title="Grid view">
            <span aria-hidden="true">▦</span>
          </button>
          <button type="button" class="view-toggle__btn" data-view="list" aria-pressed="false" title="List view">
            <span aria-hidden="true">☰</span>
          </button>
        </div>
      </div>

      <div id="advanced-filters" class="advanced-filters"></div>

      <div id="catalogue-container"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <a href="index.html" class="logo">
          <img src="assets/brand/ssa-logo-white-sm.png" alt="SSA" class="logo-img" />
        </a>
        <span class="footer-tagline">Solutions d'éclairage LED professionnel</span>
      </div>
      <div class="footer-contact"><a href="mailto:ssa@ssa.green">ssa@ssa.green</a><span class="dot"></span><span>04 84 85 60 32</span><span class="dot"></span><span>118 rue Anthonin Bonnaud, 84120 Pertuis</span></div>
      <div class="footer-copy">SSA — Solutions Solaires Adaptées · © 2026 — Tous droits réservés</div>
    </div>
  </footer>

  <script src="script.js?v=27"></script>
  <script>initCatalogue();</script>
</body>
</html>
